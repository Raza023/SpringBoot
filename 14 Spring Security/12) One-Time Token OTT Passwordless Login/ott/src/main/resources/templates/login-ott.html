<!DOCTYPE html>
<!-- login-ott.html -->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Verify Token</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at top, #0b1020, #020617);
            overflow: hidden;
            color: #fff;
        }

        /* animated soft glow background */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 198, 255, 0.12), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255, 78, 205, 0.12), transparent 45%);
            animation: bgMove 10s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* glowing blobs upgraded */
        .blob {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            animation: float 9s infinite ease-in-out;
        }

        .blob1 {
            background: radial-gradient(circle, #00ffe7, transparent 70%);
            top: 10%;
            left: 15%;
        }

        .blob2 {
            background: radial-gradient(circle, #ff4ecd, transparent 70%);
            bottom: 10%;
            right: 15%;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(35px) scale(1.1);
            }
        }

        /* glass card premium */
        .card {
            width: 400px;
            padding: 35px;
            text-align: center;

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);

            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.14);

            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);

            z-index: 10;
            animation: popIn 0.8s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* icon */
        .icon {
            font-size: 52px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 231, 0.25));
        }

        /* title */
        .card h4 {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* hint text */
        .hint {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* OTP input upgraded */
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;

            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            outline: none;

            background: rgba(255, 255, 255, 0.06);
            color: #fff;

            text-align: center;
            letter-spacing: 6px;
            font-size: 18px;

            transition: 0.3s ease;
        }

        input:focus {
            border-color: rgba(0, 198, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.12);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* verify button premium */
        button {
            width: 100%;
            padding: 13px;

            border: none;
            border-radius: 14px;

            font-weight: 600;
            cursor: pointer;

            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;

            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 114, 255, 0.35);
        }

        /* shiny sweep effect */
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 120%;
        }
    </style>
</head>

<body>

    <!-- background blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- glass card -->
    <div class="card">

        <div class="icon">🔐</div>

        <h4>Enter One-Time Token</h4>

        <div class="hint">
            Check your email and paste the login token below
        </div>

        <!-- DO NOT CHANGE ACTION: this action is provided and handled by spring security, I gave it in config. -->
        <form th:action="@{/api/v1/ott/verify}" method="post">
            <input type="text" name="token" placeholder="Enter token" th:value="${token}" required>
            <button>Verify & Login</button>
        </form>

    </div>

</body>

</html>
