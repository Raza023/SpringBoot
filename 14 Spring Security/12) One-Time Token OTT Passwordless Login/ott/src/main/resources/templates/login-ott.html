<!DOCTYPE html>
<!-- login-ott.html -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Token</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #1d2b64, #f8cdda);
            overflow: hidden;
        }

        /* glowing blobs */
        .blob {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            animation: float 9s infinite ease-in-out;
        }

        .blob1 {
            background: #00ffe7;
            top: 10%;
            left: 15%;
        }

        .blob2 {
            background: #ff4ecd;
            bottom: 10%;
            right: 15%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(35px); }
        }

        /* glass card */
        .card {
            width: 380px;
            padding: 30px;
            text-align: center;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);

            color: #fff;
            z-index: 10;
        }

        .card h4 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;

            border-radius: 12px;
            border: none;
            outline: none;

            background: rgba(255, 255, 255, 0.15);
            color: #fff;

            text-align: center;
            letter-spacing: 2px;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 12px;

            font-weight: 600;
            cursor: pointer;

            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;

            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .hint {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!-- background blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- glass card -->
<div class="card">

    <div class="icon">🔐</div>

    <h4>Enter One-Time Token</h4>

    <div class="hint">
        Check your email and paste the login token below
    </div>

    <!-- DO NOT CHANGE ACTION -->
    <form th:action="@{/api/v1/login-ott}" method="post">
        <input type="text" name="token" placeholder="Enter token" required>
        <button>Verify & Login</button>
    </form>

</div>

</body>
</html>
