<!DOCTYPE html>
<!-- login.html -->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at top, #0b1220, #020617);
            overflow: hidden;
            color: #fff;
        }

        /* animated glow background layer */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 255, 135, 0.12), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 114, 255, 0.12), transparent 40%),
                radial-gradient(circle at 50% 100%, rgba(255, 0, 200, 0.08), transparent 50%);
            animation: bgMove 10s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* glowing blobs upgraded */
        .blob {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            animation: float 10s infinite ease-in-out;
        }

        .blob1 {
            background: radial-gradient(circle, #00ffe7, transparent 70%);
            top: 10%;
            left: 10%;
        }

        .blob2 {
            background: radial-gradient(circle, #ff00c8, transparent 70%);
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(40px) scale(1.1);
            }
        }

        /* glass card upgraded */
        .card {
            width: 400px;
            padding: 35px;

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);

            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);

            z-index: 10;
            animation: popIn 0.8s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h3 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        /* inputs upgraded */
        input {
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 12px;

            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);

            outline: none;

            background: rgba(255, 255, 255, 0.06);
            color: #fff;

            transition: 0.3s ease;
        }

        input:focus {
            border-color: rgba(0, 255, 231, 0.6);
            box-shadow: 0 0 0 3px rgba(0, 255, 231, 0.1);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* buttons premium */
        button {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 14px;

            font-weight: 600;
            cursor: pointer;

            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        /* LOGIN button */
        .btn-login {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            color: white;
            margin-top: 5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.3);
        }

        /* OTT button */
        .btn-ott {
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: #000;
        }

        .btn-ott:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 135, 0.25);
        }

        /* shiny hover sweep */
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 120%;
        }

        hr {
            margin: 22px 0;
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .link a {
            color: #00ffe7;
            text-decoration: none;
            position: relative;
        }

        .link a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0%;
            height: 1px;
            background: #00ffe7;
            transition: 0.3s;
        }

        .link a:hover::after {
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- background blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- login card -->
    <div class="card">

        <h3>Welcome Back 👋</h3>

        <!-- Normal login -->
        <form th:action="@{/api/v1/login}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password">
            <button class="btn-login">Login</button>
        </form>

        <hr>

        <!-- OTT login -->
        <!-- DO NOT CHANGE ACTION: this action is provided and handled by spring security, I gave it in config. -->
        <form th:action="@{/api/v1/ott}" method="post">
            <input type="text" name="username" placeholder="Username">
            <button class="btn-ott">Send Token</button>
        </form>

        <div class="link">
            <a href="/api/v1/signup">Create account</a>
        </div>

    </div>

</body>

</html>
