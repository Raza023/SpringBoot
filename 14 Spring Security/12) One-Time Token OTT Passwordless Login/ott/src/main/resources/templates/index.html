<!DOCTYPE html>
<!-- index.html -->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Home</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at top, #0f172a, #020617);
            overflow: hidden;
            color: #fff;
        }

        /* animated gradient glow layer */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(0, 255, 231, 0.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15), transparent 40%);
            animation: pulseBg 8s ease-in-out infinite alternate;
        }

        @keyframes pulseBg {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        /* Floating blobs (enhanced glow) */
        .blob {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(0, 255, 231, 0.35), transparent 70%);
            filter: blur(90px);
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
        }

        .blob:nth-child(1) {
            top: 10%;
            left: 15%;
        }

        .blob:nth-child(2) {
            bottom: 10%;
            right: 15%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.35), transparent 70%);
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(40px) scale(1.1);
            }
        }

        /* Glass card upgraded */
        .card {
            position: relative;
            width: 400px;
            padding: 45px;
            text-align: center;

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);

            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .card span {
            background: linear-gradient(90deg, #00ffe7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* Logout button upgraded */
        .logout-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 26px;

            background: linear-gradient(135deg, rgba(0, 255, 231, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;

            color: #fff;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.5px;

            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* glowing hover effect */
        .logout-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .logout-btn:hover::before {
            left: 100%;
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 231, 0.2);
            border-color: rgba(0, 255, 231, 0.5);
        }
    </style>
</head>

<body>

    <!-- background blobs -->
    <div class="blob"></div>
    <div class="blob"></div>

    <!-- glass card -->
    <div class="card">
        <h2>Welcome <span th:text="${user}"></span></h2>

        <p>You're successfully logged in 🚀</p>

        <a class="logout-btn" href="/logout">Logout</a>
    </div>

</body>

</html>
