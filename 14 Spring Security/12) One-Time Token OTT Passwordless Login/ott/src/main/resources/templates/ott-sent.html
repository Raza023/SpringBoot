<!DOCTYPE html>
<!-- ott-sent.html -->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Token Sent</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at top, #0b1020, #020617);
            overflow: hidden;
            color: #fff;
        }

        /* animated soft glow background */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 198, 255, 0.10), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255, 60, 172, 0.10), transparent 45%);
            animation: bgMove 10s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* glowing blobs upgraded */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.45;
            animation: float 10s infinite ease-in-out;
        }

        .blob1 {
            background: radial-gradient(circle, #00ffe7, transparent 70%);
            top: 10%;
            left: 10%;
        }

        .blob2 {
            background: radial-gradient(circle, #ff3cac, transparent 70%);
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(40px) scale(1.1);
            }
        }

        /* glass card upgraded */
        .card {
            width: 430px;
            padding: 40px;
            text-align: center;

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);

            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.14);

            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.65);

            z-index: 10;
            animation: popIn 0.8s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* icon */
        .icon {
            font-size: 64px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 12px rgba(0, 255, 231, 0.25));
            animation: pop 0.6s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* headings */
        .card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card h3 span {
            background: linear-gradient(90deg, #00ffe7, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* divider line upgraded */
        .glow-line {
            width: 70px;
            height: 3px;
            margin: 18px auto;

            background: linear-gradient(90deg, #00ffe7, #ff3cac);
            border-radius: 10px;

            box-shadow: 0 0 15px rgba(0, 255, 231, 0.2);
        }

        /* paragraph */
        p {
            font-size: 14px;
            opacity: 0.75;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* buttons upgraded */
        .btn {
            display: inline-block;
            width: 100%;
            margin-top: 14px;
            padding: 12px;

            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;

            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        /* primary gradient */
        .btn:first-of-type {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
        }

        .btn:last-of-type {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* hover effects */
        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:first-of-type:hover {
            box-shadow: 0 12px 30px rgba(0, 114, 255, 0.35);
        }

        .btn:last-of-type:hover {
            box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08);
        }

        /* shiny sweep effect */
        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 120%;
        }
    </style>
</head>

<body>

    <!-- background blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- glass card -->
    <div class="card">

        <div class="icon">📩</div>

        <h3>Welcome <span th:text="${username}"></span></h3>

        <h3>One-Time Token Sent</h3>

        <div class="glow-line"></div>

        <p>
            We have securely sent your login token to your email.<br>
            Check your inbox and use it to complete login.
        </p>

        <a href="/api/v1/login-with-ott" class="btn">Proceed to login via OTT</a>
        <a href="/api/v1/login" class="btn">Back to Login</a>

    </div>

</body>

</html>
